<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Servis Plyn - Správa termínov</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <script src="https://unpkg.com/lucide-react@latest/dist/umd/lucide-react.js"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <script src="https://unpkg.com/recharts/umd/Recharts.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        @keyframes spin { to { transform: rotate(360deg); } }
        body { font-family: 'Inter', sans-serif; background: #f8fafc; margin: 0; }
        .card { background: white; border-radius: 1.25rem; border: 1px solid #f1f5f9; box-shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1); overflow: hidden; }
        .btn-primary { background: #2563eb; color: white; padding: 0.75rem 1.5rem; border-radius: 0.75rem; font-weight: 700; cursor: pointer; border: none; transition: all 0.2s; display: flex; align-items: center; gap: 0.5rem; justify-content: center; }
        .btn-primary:hover { background: #1d4ed8; transform: translateY(-1px); }
        .input-field { width: 100%; padding: 0.75rem 1rem; border-radius: 0.75rem; border: 1px solid #e2e8f0; outline: none; transition: border-color 0.2s; }
        .input-field:focus { border-color: #3b82f6; }
        .sidebar-item { display: flex; align-items: center; gap: 0.75rem; padding: 0.875rem 1rem; border-radius: 0.75rem; font-weight: 600; transition: all 0.2s; width: 100%; text-align: left; cursor: pointer; }
        .sidebar-item.active { background: #eff6ff; color: #2563eb; }
        .sidebar-item:not(.active) { color: #94a3b8; }
        .sidebar-item:not(.active):hover { background: #f8fafc; color: #64748b; }
    </style>
</head>
<body>
    <div id="root">
        <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; color: #64748b;">
            <div style="width: 40px; height: 40px; border: 4px solid #2563eb; border-top-color: transparent; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 16px;"></div>
            <p style="font-weight: 600;">Pripravujem aplikáciu Servis Plyn...</p>
        </div>
    </div>

    <script type="text/babel">
        const initApp = () => {
            const { useState, useEffect, useMemo } = React;
            const Lucide = window.LucideReact || {};
            const { 
                Wrench, LayoutDashboard, Users, History, LogOut, ChevronRight, 
                AlertCircle, Clock, CheckCircle2, Phone, MapPin, Calendar, Plus, Search
            } = Lucide;

            const firebaseConfig = {
                apiKey: "AIzaSyCZhn6jxoUR1zHXsYzTGgOpoqBwUFkB0pQ",
                authDomain: "gen-lang-client-0463998550.firebaseapp.com",
                projectId: "gen-lang-client-0463998550",
                appId: "1:138673940716:web:626554c369bf44eee45dc9",
                firestoreDatabaseId: "ai-studio-f0fbd47e-303b-40fe-88c1-505382c75ba3"
            };

            // Inicializácia Firebase s pomenovanou databázou
            if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
            const auth = firebase.auth();
            const db = firebase.app().firestore(firebaseConfig.firestoreDatabaseId);

            const getDaysRemaining = (dateStr) => {
                if (!dateStr) return 0;
                const target = new Date(dateStr);
                const now = new Date();
                now.setHours(0, 0, 0, 0);
                target.setHours(0, 0, 0, 0);
                return Math.ceil((target.getTime() - now.getTime()) / (1000 * 60 * 60 * 24));
            };

            const App = () => {
                const [user, setUser] = useState(null);
                const [loading, setLoading] = useState(true);
                const [activeTab, setActiveTab] = useState('dashboard');
                const [data, setData] = useState({ customers: [], boilers: [], services: [] });
                const [searchTerm, setSearchTerm] = useState('');

                useEffect(() => {
                    return auth.onAuthStateChanged(u => {
                        setUser(u);
                        setLoading(false);
                    });
                }, []);

                useEffect(() => {
                    if (!user) return;
                    try {
                        const unsubC = db.collection('customers').onSnapshot(s => setData(prev => ({ ...prev, customers: s.docs.map(d => ({id: d.id, ...d.data()})) })));
                        const unsubB = db.collection('boilers').onSnapshot(s => setData(prev => ({ ...prev, boilers: s.docs.map(d => ({id: d.id, ...d.data()})) })));
                        const unsubS = db.collection('services').onSnapshot(s => setData(prev => ({ ...prev, services: s.docs.map(d => ({id: d.id, ...d.data()})) })));
                        return () => { unsubC(); unsubB(); unsubS(); };
                    } catch (e) {
                        console.error("Chyba pripojenia k databáze:", e);
                    }
                }, [user]);

                if (loading) return null;

                if (!user) return (
                    <div className="min-h-screen flex items-center justify-center p-4">
                        <div className="card max-w-md w-full p-10 text-center space-y-8">
                            <div className="w-20 h-20 bg-blue-600 rounded-3xl flex items-center justify-center text-white mx-auto shadow-xl shadow-blue-200">
                                <Wrench size={40} />
                            </div>
                            <div>
                                <h1 className="text-3xl font-bold text-slate-900">Servis Plyn</h1>
                                <p className="text-slate-500 mt-2">Správa servisných termínov a zákazníkov.</p>
                            </div>
                            <button 
                                onClick={() => auth.signInWithPopup(new firebase.auth.GoogleAuthProvider())}
                                className="btn-primary w-full py-4 text-lg"
                            >
                                Prihlásiť sa cez Google
                            </button>
                            <p className="text-[10px] text-slate-400">
                                Nezabudnite povoliť doménu v nastaveniach Firebase.
                            </p>
                        </div>
                    </div>
                );

                const overdue = data.boilers.filter(b => b.nextServiceDate && getDaysRemaining(b.nextServiceDate) < 0);
                const upcoming = data.boilers.filter(b => b.nextServiceDate && getDaysRemaining(b.nextServiceDate) >= 0 && getDaysRemaining(b.nextServiceDate) <= 30);
                const onTime = data.boilers.filter(b => b.nextServiceDate && getDaysRemaining(b.nextServiceDate) > 30);

                return (
                    <div className="min-h-screen flex flex-col md:flex-row">
                        {/* Sidebar */}
                        <aside className="w-full md:w-72 bg-white border-r border-slate-100 p-6 flex flex-col h-auto md:h-screen sticky top-0">
                            <div className="flex items-center gap-3 mb-10 px-2">
                                <div className="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white">
                                    <Wrench size={20} />
                                </div>
                                <span className="font-bold text-xl text-slate-900">Servis Plyn</span>
                            </div>
                            
                            <nav className="flex-1 space-y-2">
                                <button onClick={() => setActiveTab('dashboard')} className={`sidebar-item ${activeTab === 'dashboard' ? 'active' : ''}`}>
                                    <LayoutDashboard size={20} /> Prehľad
                                </button>
                                <button onClick={() => setActiveTab('customers')} className={`sidebar-item ${activeTab === 'customers' ? 'active' : ''}`}>
                                    <Users size={20} /> Zákazníci
                                </button>
                                <button onClick={() => setActiveTab('services')} className={`sidebar-item ${activeTab === 'services' ? 'active' : ''}`}>
                                    <History size={20} /> História zásahov
                                </button>
                            </nav>

                            <div className="pt-6 border-t border-slate-50">
                                <button onClick={() => auth.signOut()} className="sidebar-item text-red-400 hover:text-red-600">
                                    <LogOut size={20} /> Odhlásiť sa
                                </button>
                            </div>
                        </aside>

                        {/* Main Content */}
                        <main className="flex-1 p-6 md:p-10 max-w-6xl mx-auto w-full">
                            {activeTab === 'dashboard' && (
                                <div className="space-y-10">
                                    <header>
                                        <h1 className="text-3xl font-bold text-slate-900">Vitajte späť, {user.displayName?.split(' ')[0]}</h1>
                                        <p className="text-slate-500 mt-1">Tu je aktuálny stav vašich servisných termínov.</p>
                                    </header>

                                    {/* Stats Grid */}
                                    <div className="grid grid-cols-1 sm:grid-cols-3 gap-6">
                                        <div className="card p-6 border-l-4 border-red-500">
                                            <div className="flex justify-between items-start">
                                                <div>
                                                    <p className="text-sm font-bold text-slate-400 uppercase tracking-wider">Po termíne</p>
                                                    <h3 className="text-4xl font-bold text-red-600 mt-1">{overdue.length}</h3>
                                                </div>
                                                <div className="p-2 bg-red-50 text-red-500 rounded-lg"><AlertCircle size={24} /></div>
                                            </div>
                                        </div>
                                        <div className="card p-6 border-l-4 border-orange-500">
                                            <div className="flex justify-between items-start">
                                                <div>
                                                    <p className="text-sm font-bold text-slate-400 uppercase tracking-wider">Blížiace sa</p>
                                                    <h3 className="text-4xl font-bold text-orange-600 mt-1">{upcoming.length}</h3>
                                                </div>
                                                <div className="p-2 bg-orange-50 text-orange-500 rounded-lg"><Clock size={24} /></div>
                                            </div>
                                        </div>
                                        <div className="card p-6 border-l-4 border-emerald-500">
                                            <div className="flex justify-between items-start">
                                                <div>
                                                    <p className="text-sm font-bold text-slate-400 uppercase tracking-wider">V termíne</p>
                                                    <h3 className="text-4xl font-bold text-emerald-600 mt-1">{onTime.length}</h3>
                                                </div>
                                                <div className="p-2 bg-emerald-50 text-emerald-500 rounded-lg"><CheckCircle2 size={24} /></div>
                                            </div>
                                        </div>
                                    </div>

                                    {/* Urgent Section */}
                                    {overdue.length > 0 && (
                                        <section className="space-y-4">
                                            <h2 className="text-xl font-bold text-slate-900 flex items-center gap-2">
                                                <AlertCircle className="text-red-500" size={24} /> Urgentné prípady
                                            </h2>
                                            <div className="grid grid-cols-1 gap-3">
                                                {overdue.map(boiler => {
                                                    const customer = data.customers.find(c => c.id === boiler.customerId);
                                                    return (
                                                        <div key={boiler.id} className="card p-5 flex items-center justify-between hover:border-red-200 transition-all cursor-pointer">
                                                            <div className="flex items-center gap-5">
                                                                <div className="w-12 h-12 bg-red-50 text-red-600 rounded-full flex items-center justify-center font-bold">
                                                                    {customer?.name?.charAt(0)}
                                                                </div>
                                                                <div>
                                                                    <h4 className="font-bold text-slate-900">{customer?.name}</h4>
                                                                    <p className="text-sm text-slate-500">{boiler.address} • {boiler.brand} {boiler.model}</p>
                                                                </div>
                                                            </div>
                                                            <div className="text-right">
                                                                <p className="text-xs font-bold text-red-400 uppercase">Mešká</p>
                                                                <span className="text-sm font-bold text-red-600">{Math.abs(getDaysRemaining(boiler.nextServiceDate))} dní</span>
                                                            </div>
                                                        </div>
                                                    );
                                                })}
                                            </div>
                                        </section>
                                    )}
                                </div>
                            )}

                            {activeTab === 'customers' && (
                                <div className="space-y-6">
                                    <header className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
                                        <div>
                                            <h1 className="text-3xl font-bold text-slate-900">Zákazníci</h1>
                                            <p className="text-slate-500">Správa klientov a ich zariadení.</p>
                                        </div>
                                        <button className="btn-primary"><Plus size={20} /> Nový zákazník</button>
                                    </header>

                                    <div className="relative">
                                        <Search className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400" size={20} />
                                        <input 
                                            type="text" 
                                            placeholder="Hľadať podľa mena, adresy alebo telefónu..." 
                                            className="input-field pl-12 py-4"
                                            value={searchTerm}
                                            onChange={(e) => setSearchTerm(e.target.value)}
                                        />
                                    </div>

                                    <div className="grid grid-cols-1 gap-4">
                                        {data.customers
                                            .filter(c => c.name?.toLowerCase().includes(searchTerm.toLowerCase()) || c.phone?.includes(searchTerm))
                                            .map(customer => (
                                            <div key={customer.id} className="card p-6 flex items-center justify-between hover:border-blue-200 transition-all cursor-pointer group">
                                                <div className="flex items-center gap-6">
                                                    <div className="w-14 h-14 bg-blue-50 text-blue-600 rounded-2xl flex items-center justify-center font-bold text-xl">
                                                        {customer.name?.charAt(0)}
                                                    </div>
                                                    <div>
                                                        <h4 className="font-bold text-lg text-slate-900">{customer.name}</h4>
                                                        <div className="flex items-center gap-4 mt-1 text-sm text-slate-500">
                                                            <span className="flex items-center gap-1"><Phone size={14} /> {customer.phone}</span>
                                                            <span className="flex items-center gap-1"><MapPin size={14} /> {customer.city}</span>
                                                        </div>
                                                    </div>
                                                </div>
                                                <ChevronRight className="text-slate-300 group-hover:text-blue-400 transition-all" size={24} />
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}

                            {activeTab === 'services' && (
                                <div className="space-y-6">
                                    <header>
                                        <h1 className="text-3xl font-bold text-slate-900">História zásahov</h1>
                                        <p className="text-slate-500">Prehľad vykonaných prác a servisov.</p>
                                    </header>

                                    <div className="card overflow-hidden">
                                        <table className="w-full text-left border-collapse">
                                            <thead className="bg-slate-50 border-b border-slate-100">
                                                <tr>
                                                    <th className="p-4 text-xs font-bold text-slate-400 uppercase">Dátum</th>
                                                    <th className="p-4 text-xs font-bold text-slate-400 uppercase">Zákazník</th>
                                                    <th className="p-4 text-xs font-bold text-slate-400 uppercase">Úkon</th>
                                                    <th className="p-4 text-xs font-bold text-slate-400 uppercase">Status</th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-slate-50">
                                                {data.services.sort((a,b) => new Date(b.date) - new Date(a.date)).map(service => {
                                                    const boiler = data.boilers.find(b => b.id === service.boilerId);
                                                    const customer = data.customers.find(c => c.id === boiler?.customerId);
                                                    return (
                                                        <tr key={service.id} className="hover:bg-slate-50/50 transition-colors">
                                                            <td className="p-4 text-sm font-medium text-slate-600">{new Date(service.date).toLocaleDateString('sk-SK')}</td>
                                                            <td className="p-4">
                                                                <div className="font-bold text-slate-900">{customer?.name}</div>
                                                                <div className="text-xs text-slate-400">{boiler?.brand} {boiler?.model}</div>
                                                            </td>
                                                            <td className="p-4 text-sm text-slate-600">{service.taskPerformed}</td>
                                                            <td className="p-4">
                                                                <span className="px-2 py-1 bg-emerald-50 text-emerald-600 text-[10px] font-bold rounded uppercase">Dokončené</span>
                                                            </td>
                                                        </tr>
                                                    );
                                                })}
                                            </tbody>
                                        </table>
                                        {data.services.length === 0 && (
                                            <div className="p-20 text-center text-slate-400 italic">Žiadne záznamy o zásahoch.</div>
                                        )}
                                    </div>
                                </div>
                            )}
                        </main>
                    </div>
                );
            };

            const rootElement = document.getElementById('root');
            if (typeof ReactDOM.createRoot === 'function') {
                ReactDOM.createRoot(rootElement).render(<App />);
            } else {
                ReactDOM.render(<App />, rootElement);
            }
        };

        window.onload = initApp;
    </script>
</body>
</html>
